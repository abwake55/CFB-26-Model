# ─────────────────────────────────────────────────────────────────────────────
# CFB Betting Model — Streamlit Secrets Template
# ─────────────────────────────────────────────────────────────────────────────
# HOW TO USE:
#   Local dev  → copy this file to .streamlit/secrets.toml and fill in your keys
#   Streamlit Cloud → paste the key=value pairs into Settings → Secrets in the UI
#
# NEVER commit secrets.toml to GitHub. It is already in .gitignore.
# ─────────────────────────────────────────────────────────────────────────────

# College Football Data API key  (https://collegefootballdata.com)
CFB_API_KEY = "paste-your-cfbd-api-key-here"

# The Odds API key  (https://the-odds-api.com)
ODDS_API_KEY = "paste-your-odds-api-key-here"

# Anthropic API key — powers the "Ask the Model" chat tab
# Get yours at: https://console.anthropic.com
ANTHROPIC_API_KEY = "paste-your-anthropic-api-key-here"
